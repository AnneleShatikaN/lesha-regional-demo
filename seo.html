<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO View — Lesha</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="seo">

<header class="site-header" id="site-header"></header>
<div class="breadcrumb-bar" id="breadcrumb-bar"></div>

<main>
  <div class="page-head">
    <div>
      <span class="page-head__eyebrow">SEO view</span>
      <h1>Oshikoto Region</h1>
      <div class="page-head__meta">Both circuits, compared regionally</div>
    </div>
  </div>

  <div class="stat-ledger" id="stat-ledger"></div>

  <section class="section">
    <div class="section__head">
      <h2>Circuits in Oshikoto</h2>
      <span class="section__hint">Click a circuit to see inspector-level detail</span>
    </div>
    <div class="card-grid card-grid--2" id="circuit-cards"></div>
  </section>

  <section class="section">
    <div class="section__head">
      <h2>Regional syllabus performance</h2>
    </div>
    <div class="card-grid card-grid--4" id="regional-subjects"></div>
  </section>

  <section class="section">
    <div class="section__head">
      <h2>Weak area heatmap</h2>
      <span class="section__hint">Top 3 topics per subject, region-wide</span>
    </div>
    <div id="heatmap"></div>
  </section>
</main>

<footer class="site-footer">Lesha &middot; SEO View</footer>

<script src="js/app.js"></script>
</body>
</html>
